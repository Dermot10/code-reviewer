name: python-worker-ci

on:
  push:
    branches:
      - feature/ backend_python
    paths:
      - "backend_python/**"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MODEL: ${{ secrets.MODEL }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend_python/requirements.txt') }}

      - name: Install deps
        run: pip install -r backend_python/requirements.txt

      - name: Run tests
        run: pytest
