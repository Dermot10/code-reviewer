name: go-api-ci

on:
  push:
    branches:
      - feature/go-api
    paths:
      - "backend_go/**"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('backend_go/go.sum') }}

      - name: Install deps
        run: go mod download
        working-directory: backend_go

      - name: Wait for DB
        run: |
          for i in {1..10}; do
            nc -z localhost 5432 && echo "DB is up" && exit 0
            echo "Waiting for DB..."
          done
          exit 1

      - name: Run tests
        run: go test ./...
        working-directory: backend_go

      - name: Build
        run: go build ./...
        working-directory: backend_go

      - name: Run linters
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run ./...
        working-directory: backend_go
